<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Michelle Pedro · Psicóloga">
  <defs>
    <linearGradient id="bg" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35553f"/>
      <stop offset="1" stop-color="#2e4a3a"/>
    </linearGradient>
  </defs>

  <!-- Fundo verde (quadrado com cantos arredondados) -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Fio dourado fino (eco da "gold-rule" do site) -->
  <rect x="5.5" y="5.5" width="53" height="53" rx="11"
        fill="none" stroke="#c2a04c" stroke-opacity="0.55" stroke-width="1.3"/>

  <!-- Folha dourada (crescimento / acolhimento) -->
  <path d="M32 13 C 22 24, 17 36, 32 51 C 47 36, 42 24, 32 13 Z" fill="#c2a04c"/>

  <!-- Nervura central (em verde, recorte elegante sobre o dourado) -->
  <path d="M32 17 Q 30.3 33 32 48" fill="none" stroke="#2e4a3a"
        stroke-width="1.7" stroke-linecap="round"/>

  <!-- Nervuras laterais sutis -->
  <path d="M31.6 28 Q 27 28 24.6 31.4 M31.6 35 Q 27.6 35.4 25.6 38.6 M32.4 28 Q 37 28 39.4 31.4 M32.4 35 Q 36.4 35.4 38.4 38.6"
        fill="none" stroke="#2e4a3a" stroke-width="1.05" stroke-opacity="0.85" stroke-linecap="round"/>
</svg>
